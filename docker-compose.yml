version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: ${DB_NAME:-portal}
      POSTGRES_USER: ${DB_USERNAME:-portal}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-portal}
    # Datenbank nicht nach aussen exponieren — nur im internen Netzwerk erreichbar
    expose:
      - "5432"
    volumes:
      - portal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-portal}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portal-backend
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${DB_NAME:-portal}
      DB_USERNAME: ${DB_USERNAME:-portal}
      DB_PASSWORD: ${DB_PASSWORD:-portal}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET Umgebungsvariable muss gesetzt sein}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/portal-deployments:/tmp/portal-deployments
      # Erstinstallation: portal-init.yml hier ablegen (optional)
      # - ./portal-init.yml:/app/config/portal-init.yml:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: portal-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  portal-data:
