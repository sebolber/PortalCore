version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - "5432:5432"
    volumes:
      - portal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: portal-backend
    environment:
      DB_HOST: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: portal-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  portal-data:
