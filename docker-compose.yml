version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: portal-db
    environment:
      POSTGRES_DB: portal
      POSTGRES_USER: portal
      POSTGRES_PASSWORD: portal
    ports:
      - "5432:5432"
    volumes:
      - portal-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  portal-data:
