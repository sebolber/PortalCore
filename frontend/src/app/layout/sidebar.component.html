<aside
  class="fixed top-0 left-0 h-screen bg-white border-r border-gray-200 flex flex-col z-20 transition-all duration-300"
  [style.width]="collapsed() ? '64px' : '256px'"
>
  <!-- Logo -->
  <div class="flex items-center h-16 px-4 border-b border-gray-100 shrink-0">
    <div class="w-8 h-8 rounded-full bg-[#006EC7] flex items-center justify-center text-white text-sm font-bold shrink-0">
      HP
    </div>
    <span
      *ngIf="!collapsed()"
      class="ml-3 text-base font-semibold text-gray-800 whitespace-nowrap"
      style="font-family: 'Fira Sans', sans-serif"
    >
      Health Portal
    </span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 overflow-y-auto overflow-x-hidden py-4">
    <ul class="space-y-1 px-2">
      <!-- Dashboard -->
      <li>
        <a
          routerLink="/"
          routerLinkActive="bg-blue-50 text-[#006EC7]"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          [class.justify-center]="collapsed()"
          [title]="collapsed() ? 'Dashboard' : ''"
        >
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="14" y="3" width="7" height="7" rx="1" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="3" y="14" width="7" height="7" rx="1" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="14" y="14" width="7" height="7" rx="1" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span *ngIf="!collapsed()" class="text-sm font-medium whitespace-nowrap">Dashboard</span>
        </a>
      </li>

      <!-- Nachrichten -->
      <li>
        <a
          routerLink="/nachrichten"
          routerLinkActive="bg-blue-50 text-[#006EC7]"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          [class.justify-center]="collapsed()"
          [title]="collapsed() ? 'Nachrichten' : ''"
        >
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span *ngIf="!collapsed()" class="text-sm font-medium whitespace-nowrap">Nachrichten</span>
        </a>
      </li>

      <!-- Plattform (expandable) -->
      <li>
        <button
          (click)="togglePlattform()"
          class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          [class.justify-center]="collapsed()"
          [title]="collapsed() ? 'Plattform' : ''"
        >
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2 17l10 5 10-5"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M2 12l10 5 10-5"/>
          </svg>
          <span *ngIf="!collapsed()" class="text-sm font-medium whitespace-nowrap flex-1 text-left">Plattform</span>
          <svg
            *ngIf="!collapsed()"
            class="w-4 h-4 shrink-0 transition-transform duration-200"
            [class.rotate-180]="plattformExpanded"
            fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <!-- Submenu -->
        <ul
          *ngIf="plattformExpanded && !collapsed()"
          class="mt-1 ml-5 space-y-1 border-l border-gray-200 pl-3"
        >
          <li>
            <a routerLink="/appstore" routerLinkActive="text-[#006EC7] font-semibold"
               class="block px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              AppStore
            </a>
          </li>
          <li>
            <a routerLink="/cms" routerLinkActive="text-[#006EC7] font-semibold"
               class="block px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              CMS
            </a>
          </li>
          <li>
            <a routerLink="/batch" routerLinkActive="text-[#006EC7] font-semibold"
               class="block px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              Batch-Jobs
            </a>
          </li>
          <li>
            <a routerLink="/parameter" routerLinkActive="text-[#006EC7] font-semibold"
               class="block px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              Parameter
            </a>
          </li>
          <li>
            <a routerLink="/benutzer" routerLinkActive="text-[#006EC7] font-semibold"
               class="block px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              Benutzer
            </a>
          </li>
          <li>
            <a routerLink="/aufgaben" routerLinkActive="text-[#006EC7] font-semibold"
               class="block px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              Aufgaben
            </a>
          </li>
          <li *ngIf="isAdmin()">
            <a routerLink="/admin" routerLinkActive="text-[#006EC7] font-semibold"
               class="flex items-center gap-2 px-3 py-1.5 text-sm text-gray-500 hover:text-gray-900 rounded transition-colors">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
              Admin
            </a>
          </li>
        </ul>
      </li>

      <!-- Formulare -->
      <li>
        <a
          routerLink="/formulare"
          routerLinkActive="bg-blue-50 text-[#006EC7]"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          [class.justify-center]="collapsed()"
          [title]="collapsed() ? 'Formulare' : ''"
        >
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
            <rect x="9" y="3" width="6" height="4" rx="1" stroke-linecap="round" stroke-linejoin="round"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6M9 16h6"/>
          </svg>
          <span *ngIf="!collapsed()" class="text-sm font-medium whitespace-nowrap">Formulare</span>
        </a>
      </li>

      <!-- KI-Agenten -->
      <li>
        <a
          routerLink="/ki-agenten"
          routerLinkActive="bg-blue-50 text-[#006EC7]"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          [class.justify-center]="collapsed()"
          [title]="collapsed() ? 'KI-Agenten' : ''"
        >
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <rect x="3" y="11" width="18" height="10" rx="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="9" cy="16" r="1" fill="currentColor"/>
            <circle cx="15" cy="16" r="1" fill="currentColor"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 11V7a4 4 0 118 0v4"/>
          </svg>
          <span *ngIf="!collapsed()" class="text-sm font-medium whitespace-nowrap">KI-Agenten</span>
        </a>
      </li>

      <!-- Einstellungen -->
      <li>
        <a
          routerLink="/einstellungen"
          routerLinkActive="bg-blue-50 text-[#006EC7]"
          class="flex items-center gap-3 px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors"
          [class.justify-center]="collapsed()"
          [title]="collapsed() ? 'Einstellungen' : ''"
        >
          <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
            <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
          </svg>
          <span *ngIf="!collapsed()" class="text-sm font-medium whitespace-nowrap">Einstellungen</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Installed Apps -->
  <div *ngIf="!collapsed()" class="px-4 pb-3 border-t border-gray-100 pt-3">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Installierte Apps</p>
    <div class="flex flex-wrap gap-2">
      <a
        *ngFor="let app of installedApps()"
        [routerLink]="app.route"
        [title]="app.name"
        class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-xs font-bold hover:opacity-80 transition-opacity"
        [style.background-color]="app.color"
      >
        {{ app.shortName }}
      </a>
    </div>
  </div>

  <!-- Collapsed: just show small dots for apps -->
  <div *ngIf="collapsed()" class="px-2 pb-3 border-t border-gray-100 pt-3 flex flex-col items-center gap-2">
    <a
      *ngFor="let app of installedApps()"
      [routerLink]="app.route"
      [title]="app.name"
      class="w-8 h-8 rounded-lg flex items-center justify-center text-white text-[10px] font-bold hover:opacity-80 transition-opacity"
      [style.background-color]="app.color"
    >
      {{ app.shortName }}
    </a>
  </div>

  <!-- Collapse Toggle -->
  <button
    (click)="toggle()"
    class="flex items-center justify-center h-12 border-t border-gray-100 text-gray-400 hover:text-gray-600 hover:bg-gray-50 transition-colors shrink-0"
  >
    <svg
      class="w-5 h-5 transition-transform duration-300"
      [class.rotate-180]="collapsed()"
      fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
    </svg>
  </button>
</aside>
