spring:
  application:
    name: health-portal

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/portal
    username: portal
    password: portal
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    de.portalcore: DEBUG
    org.springframework.security: DEBUG
